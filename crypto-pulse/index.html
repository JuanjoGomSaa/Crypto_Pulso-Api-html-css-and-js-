<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CryptoPulse_App</title>
</head>
<body>
  <header class="header">
    <h1>CryptoPulse</h1>
    <input 
      type="text" 
      id="search_input" 
      placeholder="Buscar criptomoneda..." 
    >
  </header>

  <main class="container">
    
    <!-- Lista -->
    <section id="coins_container" class="coins-list"></section>
    
    <!-- Detalle -->
    <aside class="coin-detail">
      <p class="placeholder" id="placeholder">Selecciona una moneda</p>
      <div id="charts_container"></div>
    </aside>

  </main>

  <script type="module" src="./js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
