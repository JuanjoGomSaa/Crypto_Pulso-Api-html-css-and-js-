<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CryptoPulse_App</title>
</head>
<body>
  <header class="header">
    <h1>CryptoPulse</h1>
    <input type="text" placeholder="Buscar criptomoneda..." name="" id="search-input" >
  </header>

  <main class="container">
    <!-- Lista de CRYPTOS -->
    <section id="coins_container" class="coins-list">
      <!-- Aquí van las monedas -->
    </section>
    
    <!-- Panel de detalle -->
    <section class="coin-detail">
      <p>Selecciona una moneda</p>    
      <section id="charts_container" class="coin-detail"></section>
    </section>


  </main>

  <script type="module" src="./js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
